<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Open Play — Recreation Center Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f5f4f0;
  --surface:     #ffffff;
  --surface-2:   #f0efe9;
  --border:      rgba(0,0,0,.1);
  --border-med:  rgba(0,0,0,.18);
  --text-primary:#1a1a18;
  --text-secondary:#5a5a52;
  --text-muted:  #9a9a8e;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   14px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:   0 4px 12px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);

  /* center colors */
  --doyle-col:#185FA5;      --doyle-bg:#ddeeff;
  --oagym-col:#2E7D32;      --oagym-bg:#d6f0d6;
  --oarooms-col:#1565C0;    --oarooms-bg:#cde3ff;
  --balboa-col:#854F0B;     --balboa-bg:#fdeecb;
  --nobel-col:#5B2D8E;      --nobel-bg:#ede8fb;

  /* sport colors */
  --basketball-col:#185FA5; --basketball-bg:#ddeeff;
  --volleyball-col:#2E7D32; --volleyball-bg:#e0f4e0;
  --badminton-col:#854F0B;  --badminton-bg:#fdeecb;
  --pickleball-col:#5B2D8E; --pickleball-bg:#ede8fb;
  --tt-col:#0B6E56;         --tt-bg:#d8f3ec;
  --pp-col:#0B6E56;         --pp-bg:#d8f3ec;
  --mahjong-col:#7A4800;    --mahjong-bg:#fdeecb;
  --dance-col:#8B1A4A;      --dance-bg:#fce8f0;
  --other-col:#5a5a52;      --other-bg:#efefef;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
  flex-wrap: wrap;
}
.header-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.header-title h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -.3px;
  color: var(--text-primary);
}
.header-title .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.last-updated {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  background: var(--surface-2);
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── Toolbar ── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
}
.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.ctrl-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: .7px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}
.btn-row { display: flex; gap: 4px; flex-wrap: wrap; }

select.week-sel {
  font-family: 'DM Sans', sans-serif;
  padding: 5px 10px;
  font-size: 12px;
  border: 1px solid var(--border-med);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-primary);
  cursor: pointer;
  height: 30px;
  outline: none;
}
select.week-sel:focus { border-color: #666; }

.tb {
  padding: 4px 10px;
  font-size: 11.5px;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--border-med);
  border-radius: var(--radius-sm);
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all .12s;
  user-select: none;
  outline: none;
}
.tb:hover { background: var(--surface-2); }

.toolbar-divider {
  width: 1px;
  background: var(--border);
  align-self: stretch;
  margin: 0 4px;
}

/* ── Legend ── */
.legend-bar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 6px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  min-height: 30px;
}
.leg-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-right: 2px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-secondary);
}
.leg-swatch {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
  border: 1.5px solid;
}

/* ── Calendar ── */
.cal-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 170px);
}
.cal-inner { display: flex; }

/* gutter */
.time-gutter {
  width: 46px;
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 8;
  background: var(--surface);
  border-right: 1px solid var(--border);
}
.gutter-header {
  height: 36px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 12;
  background: var(--surface);
}
.gutter-slot {
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-right: 6px;
}
.gutter-slot span {
  font-size: 8.5px;
  color: var(--text-muted);
  padding-top: 2px;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

/* day columns */
.day-cols { flex: 1; display: flex; min-width: 0; }
.day-col {
  flex: 1;
  min-width: 90px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.day-col-header {
  height: 36px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1px;
}
.day-col-header .day-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}
.day-col-header .day-date {
  font-size: 9px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}
.day-col-header.today .day-name,
.day-col-header.today .day-date { color: var(--doyle-col); }

.day-body { position: relative; flex-shrink: 0; }

/* grid lines */
.grid-line {
  position: absolute;
  left: 0; right: 0;
  pointer-events: none;
}

/* event blocks */
.ev {
  position: absolute;
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  transition: opacity .12s, box-shadow .12s, transform .1s;
  z-index: 2;
  padding: 3px 5px;
  border-left: 3px solid;
  box-shadow: var(--shadow-sm);
}
.ev:hover {
  opacity: .85;
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
  z-index: 20;
}
.ev-sport {
  font-size: 9.5px;
  font-weight: 600;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ev-center {
  font-size: 8px;
  line-height: 1.2;
  opacity: .8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.ev-time {
  font-size: 7.5px;
  line-height: 1.2;
  opacity: .7;
  white-space: nowrap;
  margin-top: 1px;
  font-family: 'DM Mono', monospace;
}
.ev-blocked {
  background: #FCEBEB !important;
  border-color: #F09595 !important;
  color: #A32D2D !important;
}
.ev-all-closed {
  position: absolute;
  inset: 0;
  background: #f5f0e8;
  border-left: 3px solid #c8b89a;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: #7a6a52;
  z-index: 3;
  letter-spacing: .2px;
}

/* ── Note bar ── */
.note-bar {
  background: #fffbf0;
  border-top: 1px solid #e8d99a;
  padding: 8px 20px;
  font-size: 11px;
  color: #7a6020;
  min-height: 34px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.note-bar:empty { display: none; }

/* ── Footer ── */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
}
.footer-sources {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  font-size: 10.5px;
  color: var(--text-muted);
}
.footer-sources a {
  color: var(--doyle-col);
  text-decoration: none;
  font-family: 'DM Mono', monospace;
}
.footer-sources a:hover { text-decoration: underline; }
.footer-note {
  font-size: 10.5px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-med);
  padding: 20px;
  max-width: 320px;
  width: 92%;
  box-shadow: var(--shadow-md);
  animation: slideUp .18s ease;
}
@keyframes slideUp {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}
.modal-close {
  cursor: pointer;
  font-size: 20px;
  color: var(--text-muted);
  line-height: 1;
  padding: 0 0 0 8px;
  flex-shrink: 0;
  background: none;
  border: none;
}
.modal-close:hover { color: var(--text-primary); }
.modal-badge {
  display: inline-block;
  font-size: 10.5px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 600;
  margin-bottom: 10px;
  border: 1px solid transparent;
}
.modal-row {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  align-items: flex-start;
  gap: 7px;
}
.modal-row .icon { flex-shrink: 0; opacity: .5; width: 14px; }
.modal-label { font-weight: 600; font-size: 13px; color: var(--text-primary); margin-bottom: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>SD Open Play</h1>
    <span class="subtitle">San Diego Recreation Centers · May 2026</span>
  </div>
  <div class="header-controls">
    <span class="last-updated" id="lastUpdated">Schedule as of May 2026</span>
  </div>
</header>

<div class="toolbar">
  <div class="ctrl-group">
    <div class="ctrl-label">Week</div>
    <select class="week-sel" id="weekSel"></select>
  </div>
  <div class="toolbar-divider"></div>
  <div class="ctrl-group">
    <div class="ctrl-label">Centers</div>
    <div class="btn-row" id="centerBtns"></div>
  </div>
  <div class="toolbar-divider"></div>
  <div class="ctrl-group">
    <div class="ctrl-label">Sports</div>
    <div class="btn-row" id="sportBtns"></div>
  </div>
</div>

<div class="legend-bar" id="legendBar"></div>
<div class="cal-wrap"><div class="cal-inner" id="calInner"></div></div>
<div class="note-bar" id="noteBar"></div>

<footer>
  <div class="footer-sources">
    Sources:
    <a href="https://www.sandiego.gov/sites/default/files/doyleopenplay.pdf" target="_blank">Doyle ↗</a>
    <a href="https://www.sandiego.gov/sites/default/files/oceanairopenplaygym.pdf" target="_blank">Ocean Air Gym ↗</a>
    <a href="https://www.sandiego.gov/sites/default/files/oceanairopenplayrooms.pdf" target="_blank">Ocean Air Rooms ↗</a>
    <a href="https://www.sandiego.gov/sites/default/files/bpaccalendar.pdf" target="_blank">BPAC ↗</a>
    <a href="https://www.sandiego.gov/sites/default/files/nobelopenplay.pdf" target="_blank">Nobel ↗</a>
  </div>
  <div class="footer-note">All schedules subject to change · confirm with each center before visiting</div>
</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
'use strict';

// ─── CONFIG ──────────────────────────────────────────────────────────────────
// To add a new center: add an entry to CENTERS and add its events to weeklyEvents()
const CENTERS = [
  { id:'doyle',       label:'Doyle Park',          short:'Doyle',    addr:'8175 Regents Rd',   col:'#185FA5', bg:'#ddeeff' },
  { id:'ocean_gym',   label:'Ocean Air – Gym',      short:'OA Gym',   addr:'4770 Fairport Way', col:'#2E7D32', bg:'#d6f0d6' },
  { id:'ocean_rooms', label:'Ocean Air – Rooms',    short:'OA Rooms', addr:'4770 Fairport Way', col:'#1565C0', bg:'#cde3ff' },
  { id:'balboa',      label:'Balboa Park (BPAC)',   short:'BPAC',     addr:'2145 Park Blvd',    col:'#854F0B', bg:'#fdeecb' },
  { id:'nobel',       label:'Nobel Rec Center',     short:'Nobel',    addr:'8810 Judicial Dr',  col:'#5B2D8E', bg:'#ede8fb' },
];

const SPORTS_LIST = ['Basketball','Volleyball','Badminton','Pickleball','Table Tennis','Ping Pong','Mahjong','Dance'];

const SPORT_STYLE = {
  Basketball:    { col:'#185FA5', bg:'#ddeeff' },
  Volleyball:    { col:'#2E7D32', bg:'#e0f4e0' },
  Badminton:     { col:'#854F0B', bg:'#fdeecb' },
  Pickleball:    { col:'#5B2D8E', bg:'#ede8fb' },
  'Table Tennis':{ col:'#0B6E56', bg:'#d8f3ec' },
  'Ping Pong':   { col:'#0B6E56', bg:'#d8f3ec' },
  Mahjong:       { col:'#7A4800', bg:'#fdeecb' },
  Dance:         { col:'#8B1A4A', bg:'#fce8f0' },
  Other:         { col:'#5a5a52', bg:'#efefef' },
};

const HR_START = 9, HR_END = 21;
const SLOT_H   = 13;  // px per 15-min slot
const TOTAL_SLOTS = (HR_END - HR_START) * 4;
const COL_GAP  = 2;   // px gap between side-by-side events
const TODAY    = 26;  // May 26 2026

// May 2026: May 1 = Friday (dow 5)
function getDow(d) { return (5 + d - 1) % 7; }
function toMin(h, m) { return h * 60 + m; }
function fmt(h, m) {
  const ap = h >= 12 ? 'pm' : 'am';
  const hh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return `${hh}:${String(m).padStart(2,'0')}${ap}`;
}

const WEEKS = [
  { label:'Week 1 — May 1–2',   dates:[null,null,null,null,null,1,2] },
  { label:'Week 2 — May 3–9',   dates:[3,4,5,6,7,8,9] },
  { label:'Week 3 — May 10–16', dates:[10,11,12,13,14,15,16] },
  { label:'Week 4 — May 17–23', dates:[17,18,19,20,21,22,23] },
  { label:'Week 5 — May 24–30', dates:[24,25,26,27,28,29,30] },
];

// ─── EVENT DATA ───────────────────────────────────────────────────────────────
// Each event: { center, sport, label, sh, sm, eh, em, loc }
// To update a center's schedule: find its section below and edit the times.
function weeklyEvents(dow) {
  const e = [];
  if (dow === 0) return e; // All centers closed Sunday

  // ── DOYLE PARK (doyleopenplay.pdf) ──────────────────────────────────────────
  if (dow === 1) {
    e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:11, sm:50, eh:14, em:0,  loc:'Gym' });
    e.push({ center:'doyle', sport:'Volleyball', label:'Open Volleyball', sh:16, sm:30, eh:20, em:30, loc:'Gym' });
  }
  if (dow === 2) {
    e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:11, sm:50, eh:14, em:0,  loc:'Gym' });
    e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:16, sm:0,  eh:17, em:30, loc:'Gym' });
  }
  if (dow === 3) e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:15, sm:30, eh:17, em:0, loc:'Gym' });
  if (dow === 4) {
    e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:11, sm:50, eh:14, em:0,  loc:'Gym' });
    e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:16, sm:0,  eh:17, em:0,  loc:'Gym' });
  }
  if (dow === 5) e.push({ center:'doyle', sport:'Basketball', label:'Open Basketball', sh:15, sm:30, eh:17, em:0, loc:'Gym' });
  if (dow === 6) e.push({ center:'doyle', sport:'Badminton',  label:'Open Badminton',  sh:9,  sm:0,  eh:14, em:30, loc:'Gym' });

  // ── OCEAN AIR GYM (oceanairopenplaygym.pdf) ──────────────────────────────────
  // Basketball: Mon 2:30–3:30pm | Wed 2:15–8:45pm | Thu 2:30–5:30pm | Fri 2:30–4:30pm
  // Badminton:  Tue 9:15am–2:30pm | Thu 9:15am–2:30pm
  // Pickleball: Mon 10:15am–2:30pm | Wed 9:15am–12:30pm | Fri 10:15am–6:45pm (two back-to-back sessions)
  // Volleyball: Adults Tue 6:00–7:45pm
  if (dow === 1) {
    e.push({ center:'ocean_gym', sport:'Pickleball', label:'Pickleball',             sh:10, sm:15, eh:14, em:30, loc:'Gymnasium' });
    e.push({ center:'ocean_gym', sport:'Basketball', label:'Basketball',             sh:14, sm:30, eh:15, em:30, loc:'Gymnasium' });
  }
  if (dow === 2) {
    e.push({ center:'ocean_gym', sport:'Badminton',  label:'Badminton',              sh:9,  sm:15, eh:14, em:30, loc:'Gymnasium' });
    e.push({ center:'ocean_gym', sport:'Volleyball', label:'Volleyball (Adults)',    sh:18, sm:0,  eh:19, em:45, loc:'Gymnasium' });
  }
  if (dow === 3) {
    e.push({ center:'ocean_gym', sport:'Pickleball', label:'Pickleball',             sh:9,  sm:15, eh:12, em:30, loc:'Gymnasium' });
    e.push({ center:'ocean_gym', sport:'Basketball', label:'Basketball',             sh:14, sm:15, eh:20, em:45, loc:'Gymnasium' });
  }
  if (dow === 4) {
    e.push({ center:'ocean_gym', sport:'Badminton',  label:'Badminton',              sh:9,  sm:15, eh:14, em:30, loc:'Gymnasium' });
    e.push({ center:'ocean_gym', sport:'Basketball', label:'Basketball',             sh:14, sm:30, eh:17, em:30, loc:'Gymnasium' });
  }
  if (dow === 5) {
    // Fri Pickleball: 10:15am–2:30pm then 2:30–6:45pm (3 courts) = one continuous block
    e.push({ center:'ocean_gym', sport:'Pickleball', label:'Pickleball (3 courts from 2:30pm)', sh:10, sm:15, eh:18, em:45, loc:'Gymnasium' });
    e.push({ center:'ocean_gym', sport:'Basketball', label:'Basketball',             sh:14, sm:30, eh:16, em:30, loc:'Gymnasium' });
  }

  // ── OCEAN AIR ROOMS (oceanairopenplayrooms.pdf May 2026) ──────────────────────
  if (dow === 1) {
    e.push({ center:'ocean_rooms', sport:'Ping Pong', label:'Ping Pong', sh:10, sm:0,  eh:16, em:30, loc:'Room 100' });
    e.push({ center:'ocean_rooms', sport:'Ping Pong', label:'Ping Pong', sh:10, sm:0,  eh:12, em:30, loc:'Room 105' });
    e.push({ center:'ocean_rooms', sport:'Mahjong',   label:'Mahjong',   sh:13, sm:0,  eh:16, em:0,  loc:'Room 105' });
  }
  if (dow === 2) {
    e.push({ center:'ocean_rooms', sport:'Ping Pong', label:'Ping Pong',      sh:9,  sm:0,  eh:19, em:45, loc:'Room 100' });
    e.push({ center:'ocean_rooms', sport:'Dance',     label:'Chinese Dance',  sh:10, sm:0,  eh:12, em:0,  loc:'Room 105' });
    e.push({ center:'ocean_rooms', sport:'Ping Pong', label:'Ping Pong',      sh:12, sm:30, eh:19, em:45, loc:'Room 105' });
  }

const DATE_OVERRIDES = {
  2:  [{ center:'balboa',      blocked:true, label:'BPAC Closed – Volleyball Tournament',   sh:9, sm:0, eh:21, em:0, sport:'Other' }],
  3:  [{ center:'balboa',      blocked:true, label:'BPAC Closed – Volleyball Tournament',   sh:9, sm:0, eh:21, em:0, sport:'Other' }],
  23: [{ center:'balboa',      blocked:true, label:'BPAC Closed – Table Tennis Tournament', sh:9, sm:0, eh:21, em:0, sport:'Other' }],
  24: [{ center:'balboa',      blocked:true, label:'BPAC Closed – Table Tennis Tournament', sh:9, sm:0, eh:21, em:0, sport:'Other' }],
  25: 'all_closed',
  29: [{ center:'ocean_rooms', blocked:true, label:'Ocean Air Rooms – Voting Pole Setup',   sh:9, sm:0, eh:21, em:0, sport:'Other' }],
  30: [{ center:'ocean_rooms', blocked:true, label:'Ocean Air Rooms – Voting Pole Setup',   sh:9, sm:0, eh:21, em:0, sport:'Other' }],
};

function getEventsForDate(d) {
  if (!d) return [];
  const dow = getDow(d);
  if (dow === 0) return [];
  if (d === 25) return [{ center:'all', blocked:true, allDay:true, label:'Memorial Day – All Centers Closed', sh:HR_START, sm:0, eh:HR_END, em:0, sport:'Other' }];
  let evs = weeklyEvents(dow).map(e => ({ ...e }));
  const ov = DATE_OVERRIDES[d];
  if (ov && ov !== 'all_closed') {
    ov.forEach(o => {
      evs = evs.filter(e => e.center !== o.center);
      evs.push({ ...o });
    });
  }
  return evs;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let curWeek     = 3; // default Week 3 (contains today May 26)
let selCenters  = new Set(); // empty = all
let selSports   = new Set(); // empty = all

// ─── COLOR LOGIC ─────────────────────────────────────────────────────────────
// - No filters active → color by sport
// - Only center filtered → color by sport (distinguish what's at that center)
// - Only sport filtered  → color by center (distinguish where you can play it)
// - Both filtered        → color by sport
function colorMode() {
  const hc = selCenters.size > 0, hs = selSports.size > 0;
  if (!hc && !hs) return 'sport';
  if (hc && !hs)  return 'sport';
  if (!hc && hs)  return 'center';
  return 'sport';
}

function evStyle(ev) {
  if (ev.blocked) return { bg:'#FCEBEB', border:'#F09595', text:'#A32D2D' };
  if (colorMode() === 'center') {
    const c = CENTERS.find(x => x.id === ev.center);
    return c ? { bg:c.bg, border:c.col, text:c.col } : { bg:'#eee', border:'#888', text:'#444' };
  }
  const s = SPORT_STYLE[ev.sport] || SPORT_STYLE.Other;
  return { bg:s.bg, border:s.col, text:s.col };
}

function passesFilter(ev) {
  if (ev.blocked || ev.allDay) return true;
  const cOk = selCenters.size === 0 || selCenters.has(ev.center);
  const sOk = selSports.size  === 0 || selSports.has(ev.sport);
  return cOk && sOk;
}

// ─── LAYOUT: side-by-side columns ────────────────────────────────────────────
function layoutDay(evs) {
  if (!evs.length) return [];
  const sorted = [...evs].sort((a, b) => toMin(a.sh, a.sm) - toMin(b.sh, b.sm));
  const n = sorted.length;
  const col = new Array(n).fill(-1);
  const colEnd = [];
  for (let i = 0; i < n; i++) {
    const s = toMin(sorted[i].sh, sorted[i].sm);
    let chosen = colEnd.findIndex(em => em <= s);
    if (chosen === -1) { chosen = colEnd.length; colEnd.push(0); }
    col[i] = chosen;
    colEnd[chosen] = toMin(sorted[i].eh, sorted[i].em);
  }
  return sorted.map((ev, i) => {
    const s = toMin(ev.sh, ev.sm), en = toMin(ev.eh, ev.em);
    let maxCol = col[i];
    for (let j = 0; j < n; j++) {
      if (toMin(sorted[j].sh, sorted[j].sm) < en && toMin(sorted[j].eh, sorted[j].em) > s && col[j] > maxCol)
        maxCol = col[j];
    }
    return { ...ev, col: col[i], totalCols: maxCol + 1 };
  });
}

function evTopPx(ev) {
  return Math.max(0, (ev.sh - HR_START) * 4 + Math.floor(ev.sm / 15)) * SLOT_H;
}
function evHeightPx(ev) {
  const s = (ev.sh - HR_START) * 4 + Math.floor(ev.sm / 15);
  const e = Math.ceil((toMin(ev.eh, ev.em) - HR_START * 60) / 15);
  return Math.max(SLOT_H, (Math.min(e, TOTAL_SLOTS) - Math.max(0, s)) * SLOT_H);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const DAYS7 = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function render() {
  renderLegend();
  renderCalendar();
  renderNote();
}

function renderCalendar() {
  const dates = WEEKS[curWeek].dates;
  const totalH = TOTAL_SLOTS * SLOT_H;

  // Build DOM directly for performance
  const root = document.getElementById('calInner');
  root.innerHTML = '';

  // Time gutter
  const gutter = document.createElement('div');
  gutter.className = 'time-gutter';
  const gutterHdr = document.createElement('div');
  gutterHdr.className = 'gutter-header';
  gutter.appendChild(gutterHdr);
  for (let h = HR_START; h < HR_END; h++) {
    for (let q = 0; q < 4; q++) {
      const slot = document.createElement('div');
      slot.className = 'gutter-slot';
      slot.style.height = SLOT_H + 'px';
      if (q === 0) {
        const lbl = document.createElement('span');
        lbl.textContent = (h > 12 ? h - 12 : h) + (h >= 12 ? 'pm' : 'am');
        slot.appendChild(lbl);
      }
      gutter.appendChild(slot);
    }
  }
  root.appendChild(gutter);

  // Day columns container
  const dayColsEl = document.createElement('div');
  dayColsEl.className = 'day-cols';

  dates.forEach((d, dow) => {
    const isToday = d === TODAY;
    const col = document.createElement('div');
    col.className = 'day-col';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'day-col-header' + (isToday ? ' today' : '');
    const nameEl = document.createElement('span');
    nameEl.className = 'day-name';
    nameEl.textContent = DAYS7[dow];
    hdr.appendChild(nameEl);
    if (d) {
      const dateEl = document.createElement('span');
      dateEl.className = 'day-date';
      dateEl.textContent = 'May ' + d;
      hdr.appendChild(dateEl);
    }
    col.appendChild(hdr);

    // Body
    const body = document.createElement('div');
    body.className = 'day-body';
    body.style.height = totalH + 'px';

    // Grid lines
    for (let h = HR_START; h < HR_END; h++) {
      for (let q = 0; q < 4; q++) {
        const line = document.createElement('div');
        line.className = 'grid-line';
        line.style.top = ((h - HR_START) * 4 + q) * SLOT_H + 'px';
        line.style.height = SLOT_H + 'px';
        if (q === 0) line.style.borderBottom = '1px solid rgba(0,0,0,.07)';
        else if (q === 2) line.style.borderBottom = '1px solid rgba(0,0,0,.04)';
        else line.style.borderBottom = '1px dashed rgba(0,0,0,.03)';
        body.appendChild(line);
      }
    }

    // Events
    if (d) {
      const raw = getEventsForDate(d);
      if (raw.some(e => e.allDay)) {
        const closed = document.createElement('div');
        closed.className = 'ev-all-closed';
        closed.innerHTML = 'Memorial Day<br>Closed';
        body.appendChild(closed);
      } else {
        const filtered = raw.filter(ev => passesFilter(ev));
        const laid = layoutDay(filtered);
        laid.forEach(ev => {
          if (ev.allDay) return;
          const top = evTopPx(ev);
          const ht  = evHeightPx(ev);
          const tc  = ev.totalCols || 1;
          const leftPct  = (ev.col / tc * 100).toFixed(3);
          const widthPct = (1 / tc * 100).toFixed(3);
          const { bg, border, text } = evStyle(ev);
          const cInfo = CENTERS.find(c => c.id === ev.center);
          const timeStr = fmt(ev.sh, ev.sm) + '–' + fmt(ev.eh, ev.em);
          const showCenter = ht >= 30 && cInfo;
          const showTime   = ht >= 44;

          const el = document.createElement('div');
          el.className = 'ev' + (ev.blocked ? ' ev-blocked' : '');
          el.style.cssText = [
            `background:${bg}`,
            `border-left-color:${border}`,
            `color:${text}`,
            `top:${top}px`,
            `height:${ht}px`,
            `left:${leftPct}%`,
            `width:calc(${widthPct}% - ${COL_GAP}px)`,
            `z-index:4`,
          ].join(';');

          const sportEl = document.createElement('div');
          sportEl.className = 'ev-sport';
          sportEl.textContent = ev.sport;
          el.appendChild(sportEl);

          if (showCenter) {
            const centEl = document.createElement('div');
            centEl.className = 'ev-center';
            centEl.textContent = cInfo.short;
            el.appendChild(centEl);
          }
          if (showTime) {
            const timeEl = document.createElement('div');
            timeEl.className = 'ev-time';
            timeEl.textContent = timeStr;
            el.appendChild(timeEl);
          }

          // Click handler — capture data in closure
          const evData = { label:ev.label, sport:ev.sport, center:ev.center, sh:ev.sh, sm:ev.sm, eh:ev.eh, em:ev.em, loc:ev.loc||'' };
          el.addEventListener('click', () => openModal(evData));

          body.appendChild(el);
        });
      }
    }

    col.appendChild(body);
    dayColsEl.appendChild(col);
  });

  root.appendChild(dayColsEl);
}

function renderLegend() {
  const bar = document.getElementById('legendBar');
  bar.innerHTML = '';
  const mode = colorMode();
  const lblEl = document.createElement('span');
  lblEl.className = 'leg-label';
  lblEl.textContent = mode === 'center' ? 'Centers:' : 'Sports:';
  bar.appendChild(lblEl);

  if (mode === 'center') {
    const list = selCenters.size > 0 ? CENTERS.filter(c => selCenters.has(c.id)) : CENTERS;
    list.forEach(c => {
      const item = document.createElement('div');
      item.className = 'leg-item';
      item.innerHTML = `<div class="leg-swatch" style="background:${c.bg};border-color:${c.col}"></div>${c.label}`;
      bar.appendChild(item);
    });
  } else {
    const list = selSports.size > 0 ? SPORTS_LIST.filter(s => selSports.has(s)) : SPORTS_LIST;
    list.forEach(s => {
      const st = SPORT_STYLE[s] || SPORT_STYLE.Other;
      const item = document.createElement('div');
      item.className = 'leg-item';
      item.innerHTML = `<div class="leg-swatch" style="background:${st.bg};border-color:${st.col}"></div>${s}`;
      bar.appendChild(item);
    });
  }
}

function renderNote() {
  const n = [];
  if (curWeek === 1) n.push('May 2–3: BPAC closed – Volleyball Tournament.');
  if (curWeek === 3) n.push('May 22: BPAC partial (SDTTA Tourney 4pm+). May 23: BPAC closed – Table Tennis Tournament.');
  if (curWeek === 4) {
    n.push('May 25: Memorial Day – all centers closed.');
    n.push('May 29–30: Ocean Air Rooms closed – Voting Pole setup (Gym unaffected).');
  }
  const bar = document.getElementById('noteBar');
  if (n.length) {
    bar.textContent = '⚠ ' + n.join('  ·  ');
    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(ev) {
  const c = CENTERS.find(x => x.id === ev.center);
  const st = evStyle(ev);
  document.getElementById('modalTitle').textContent = ev.label;
  let html = '';
  if (c) html += `<div class="modal-badge" style="background:${c.bg};color:${c.col};border-color:${c.col}55">${c.label}</div>`;
  html += `<div class="modal-label">${ev.sport}</div>`;
  html += `<div class="modal-row"><span class="icon">⏰</span><span>${fmt(ev.sh, ev.sm)} – ${fmt(ev.eh, ev.em)}</span></div>`;
  if (ev.loc) html += `<div class="modal-row"><span class="icon">📍</span><span>${ev.loc}${c ? ', ' + c.addr : ''}</span></div>`;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ─── FILTER BUTTONS ───────────────────────────────────────────────────────────
function applyBtnStyle(btn, active, bg, col) {
  if (active) {
    btn.style.background   = bg;
    btn.style.color        = col;
    btn.style.borderColor  = col + '99';
    btn.style.fontWeight   = '600';
  } else {
    btn.style.background  = '';
    btn.style.color       = '';
    btn.style.borderColor = '';
    btn.style.fontWeight  = '';
  }
}

function buildFilters() {
  // Centers
  const cg = document.getElementById('centerBtns');
  cg.innerHTML = '';
  const allC = document.createElement('button');
  allC.className = 'tb';
  allC.textContent = 'All';
  applyBtnStyle(allC, selCenters.size === 0, '#f0efe9', '#1a1a18');
  allC.style.borderColor = selCenters.size === 0 ? 'rgba(0,0,0,.35)' : '';
  allC.addEventListener('click', () => { selCenters.clear(); buildFilters(); render(); });
  cg.appendChild(allC);

  CENTERS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tb';
    btn.textContent = c.short;
    applyBtnStyle(btn, selCenters.has(c.id), c.bg, c.col);
    btn.addEventListener('click', () => {
      if (selCenters.has(c.id)) selCenters.delete(c.id);
      else selCenters.add(c.id);
      applyBtnStyle(btn, selCenters.has(c.id), c.bg, c.col);
      applyBtnStyle(allC, selCenters.size === 0, '#f0efe9', '#1a1a18');
      allC.style.borderColor = selCenters.size === 0 ? 'rgba(0,0,0,.35)' : '';
      render();
    });
    cg.appendChild(btn);
  });

  // Sports
  const sg = document.getElementById('sportBtns');
  sg.innerHTML = '';
  const allS = document.createElement('button');
  allS.className = 'tb';
  allS.textContent = 'All';
  applyBtnStyle(allS, selSports.size === 0, '#f0efe9', '#1a1a18');
  allS.style.borderColor = selSports.size === 0 ? 'rgba(0,0,0,.35)' : '';
  allS.addEventListener('click', () => { selSports.clear(); buildFilters(); render(); });
  sg.appendChild(allS);

  SPORTS_LIST.forEach(s => {
    const st = SPORT_STYLE[s] || SPORT_STYLE.Other;
    const btn = document.createElement('button');
    btn.className = 'tb';
    btn.textContent = s;
    applyBtnStyle(btn, selSports.has(s), st.bg, st.col);
    btn.addEventListener('click', () => {
      if (selSports.has(s)) selSports.delete(s);
      else selSports.add(s);
      applyBtnStyle(btn, selSports.has(s), st.bg, st.col);
      applyBtnStyle(allS, selSports.size === 0, '#f0efe9', '#1a1a18');
      allS.style.borderColor = selSports.size === 0 ? 'rgba(0,0,0,.35)' : '';
      render();
    });
    sg.appendChild(btn);
  });
}

// ─── WEEK DROPDOWN ────────────────────────────────────────────────────────────
(function buildWeekDropdown() {
  const sel = document.getElementById('weekSel');
  WEEKS.forEach((w, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = w.label;
    if (i === curWeek) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { curWeek = parseInt(sel.value); render(); });
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildFilters();
render();
